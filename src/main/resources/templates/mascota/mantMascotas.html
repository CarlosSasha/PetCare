<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Mascotas - PetCare</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
<style>
  body { background: #f0f2f5; }
  .navbar-petcare { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .page-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .page-card .card-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 16px 16px 0 0; padding: 18px 24px; }
  .btn-nuevo { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border: none; font-weight: 600; border-radius: 10px; padding: 8px 20px; color: #1a5c3a; }
  .btn-nuevo:hover { opacity: 0.9; color: #1a5c3a; }
  .modal-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 12px 12px 0 0; }
  .modal-header .btn-close { filter: invert(1); }
  .modal-content { border-radius: 12px; border: none; }
  .form-label { font-weight: 600; font-size: 0.85rem; color: #555; }
  .form-control, .form-select { border-radius: 8px; border-color: #dde1f0; }
  .form-control:focus, .form-select:focus { border-color: #f5576c; box-shadow: 0 0 0 3px rgba(245,87,108,0.15); }
  .nav-link-item { color: rgba(255,255,255,0.85) !important; font-weight: 500; padding: 8px 14px; border-radius: 8px; }
  .nav-link-item:hover { background: rgba(255,255,255,0.15); color: white !important; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-petcare mb-4">
  <div class="container-fluid px-4">
    <span class="navbar-brand text-white fw-bold"><i class="bi bi-heart-pulse-fill me-2"></i>PetCare</span>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncita/lista"><i class="bi bi-calendar2-check me-1"></i>Citas</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncliente/lista"><i class="bi bi-people me-1"></i>Clientes</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item active bg-white bg-opacity-25" href="/gestionmascota/lista"><i class="bi bi-github me-1"></i>Mascotas</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionmedico/lista"><i class="bi bi-person-badge me-1"></i>Médicos</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionusuario/lista"><i class="bi bi-person-gear me-1"></i>Usuarios</a></li>
      </ul>
      <a href="/inicioSesion/logout" class="btn btn-outline-light btn-sm rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-4">
  <div class="card page-card">
	
    <div class="card-header d-flex align-items-center justify-content-between">
      <h5 class="mb-0 text-white fw-bold"><i class="bi bi-github me-2"></i>Gestión de Mascotas</h5>
      <span class="badge bg-white" style="color:#f5576c;">Módulo Mascotas</span>
    </div>
	
    <div class="card-body p-4">

      <div id="msg" th:if="${msg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2 py-2">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
      </div>

      <div class="mb-3">
        <button id="btnNuevo" class="btn btn-nuevo" data-bs-toggle="modal" data-bs-target="#ventanaModal">
          <i class="bi bi-plus-circle me-1"></i> Nueva Mascota
        </button>
      </div>

      <div class="table-responsive">
        <table id="tablaMascota" class="table table-bordered table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th><th>Dueño</th><th>Nombre</th><th>Especie</th>
              <th>Raza</th><th>Fecha Nac.</th><th>Estado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="m : ${mascotas}">
              <td th:text="${m.idMascota}"></td>
              <td th:text="${m.cliente.nombres + ' ' + m.cliente.apellidos}"></td>
              <td><strong th:text="${m.nombre}"></strong></td>
              <td>
                <span class="badge bg-info text-dark" th:text="${m.especie}"></span>
              </td>
              <td th:text="${m.raza}"></td>
              <td th:text="${m.fechaNacimiento}"></td>
              <td>
                <span class="badge rounded-pill"
                      th:classappend="${m.estado == 'ACTIVO'} ? 'bg-success' : 'bg-danger'"
                      th:text="${m.estado}"></span>
              </td>
              <td>
                <button class="btn btn-warning btn-sm btnEditar" th:data-id="${m.idMascota}" title="Editar">
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-danger btn-sm btnEliminar" th:data-id="${m.idMascota}" title="Desactivar">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
$(document).ready(function() {
  $('#tablaMascota').DataTable({ language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' } });
});

$("#btnNuevo").click(function() {
  $("#tituloModal").text("Registrar Mascota");
  $("#frmMascota").attr("action", "/gestionmascota/registrar");
  $("#idMascota").val(0);
  $("#idCliente").val(0); //0 Para el texto del select
  $("#nombre").val("");
  $("#especie").val("Perro");
  $("#raza").val("");
  $("#fechaNacimiento").val("");
  $("#estado").val("ACTIVO");
});

$(document).on("click", ".btnEditar", function() {
  let id = $(this).data("id");
  $("#tituloModal").text("Editar Mascota");
  $("#frmMascota").attr("action", "/gestionmascota/actualizar");
  $.get("/gestionmascota/buscar/" + id, function(data) {
    $("#idMascota").val(data.idMascota);
    $("#idCliente").val(data.cliente.idCliente);
    $("#nombre").val(data.nombre);
    $("#especie").val(data.especie);
    $("#raza").val(data.raza);
    $("#fechaNacimiento").val(data.fechaNacimiento);
    $("#estado").val(data.estado);
    $("#ventanaModal").modal("show");
  });
});

$(document).on("click", ".btnEliminar", function() {
  let id = $(this).data("id");
  if (confirm("¿Desea desactivar el registro de esta mascota?")) {
    window.location = "/gestionmascota/desactivar/" + id;
  }
});

setTimeout(function() {
  let m = document.getElementById("msg");
  if (m) { new bootstrap.Alert(m).close(); }
}, 3000);
</script>

<!-- Modal -->
<div class="modal fade" id="ventanaModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
		
      <form id="frmMascota" th:action="@{/gestionmascota/registrar}" th:object="${mascota}" method="post">
        <input type="hidden" id="idMascota" th:field="*{idMascota}">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal"><i class="bi bi-plus-circle-fill me-2"></i>Registrar Mascota</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Dueño (Cliente)</label>
              <select id="idCliente" class="form-select" th:field="*{cliente.idCliente}">
                <option value="0">-- Seleccione Cliente --</option>
                <option th:each="c : ${clientes}" th:value="${c.idCliente}"
                        th:text="${c.nombres + ' ' + c.apellidos}"></option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Nombre de la Mascota</label>
              <input id="nombre" type="text" class="form-control" th:field="*{nombre}" placeholder="Nombre de la mascota">
            </div>
            <div class="col-md-6">
              <label class="form-label">Especie</label>
              <select id="especie" class="form-select" th:field="*{especie}">
                <option value="Perro">🐶 Perro</option>
                <option value="Gato">🐱 Gato</option>
                <option value="Ave">🐦 Ave</option>
                <option value="Reptil">🦎 Reptil</option>
                <option value="Otro">🐾 Otro</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Raza</label>
              <input id="raza" type="text" class="form-control" th:field="*{raza}" placeholder="Raza de la mascota">
            </div>
            <div class="col-md-6">
              <label class="form-label">Fecha de Nacimiento</label>
              <input id="fechaNacimiento" type="date" class="form-control" th:field="*{fechaNacimiento}">
            </div>
            <div class="col-md-6">
              <label class="form-label">Estado</label>
              <select id="estado" class="form-select" th:field="*{estado}">
                <option value="ACTIVO">ACTIVO</option>
                <option value="INACTIVO">INACTIVO</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"><i class="bi bi-x me-1"></i>Cerrar</button>
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
