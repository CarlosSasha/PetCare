<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PetCare - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }
        .login-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 35px 30px 30px;
            text-align: center;
            color: white;
        }
        .login-header .paw-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }
        .login-header h2 {
            font-weight: 700;
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 1px;
        }
        .login-header p {
            opacity: 0.85;
            margin: 6px 0 0;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 35px 35px 30px;
        }
        .form-floating label {
            color: #888;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f4f6ff;
            border-color: #e0e0e0;
            color: #667eea;
        }
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .login-footer {
            text-align: center;
            padding: 15px;
            background: #f8f9ff;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <span class="paw-icon"><i class="bi bi-heart-pulse-fill"></i></span>
                <h2>PetCare</h2>
                <p>Sistema de Gestión Veterinaria</p>
            </div>
            <div class="login-body">
                <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${msg}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${msg}"></span>
                </div>

                <form th:action="@{/inicioSesion/validar}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">USUARIO</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" class="form-control" name="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">CONTRASEÑA</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="Ingresa tu clave" required autocomplete="current-password">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-login text-white">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
                        </button>
                    </div>
                </form>
            </div>
            <div class="login-footer">
                &copy; 2026 PetCare &mdash; Todos los derechos reservados
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
