<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

<style>
  body { background: #f0f2f5; }
  .navbar-petcare { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .page-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .page-card .card-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 16px 16px 0 0; padding: 18px 24px; }
  .btn-nuevo { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border: none; font-weight: 600; border-radius: 10px; padding: 8px 20px; color: #1a5c3a; }
  .btn-nuevo:hover { opacity: 0.9; color: #1a5c3a; }
  .modal-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border-radius: 12px 12px 0 0; }
  .modal-header .btn-close { filter: invert(1); }
  .modal-content { border-radius: 12px; border: none; }
  .form-label { font-weight: 600; font-size: 0.85rem; color: #555; }
  .form-control, .form-select { border-radius: 8px; border-color: #dde1f0; }
  .form-control:focus, .form-select:focus { border-color: #f5576c; box-shadow: 0 0 0 3px rgba(245,87,108,0.15); }
  .nav-link-item { color: rgba(255,255,255,0.85) !important; font-weight: 500; padding: 8px 14px; border-radius: 8px; }
  .nav-link-item:hover { background: rgba(255,255,255,0.15); color: white !important; }
</style>

</head>

<body>
	<!--Nav-->
	<nav class="navbar navbar-expand-lg navbar-petcare mb-4">
	  <div class="container-fluid px-4">
	    <span class="navbar-brand text-white fw-bold"><i class="bi bi-heart-pulse-fill me-2"></i>PetCare</span>
	    <div class="collapse navbar-collapse">
	      <ul class="navbar-nav me-auto">
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncita/lista"><i class="bi bi-calendar2-check me-1"></i>Citas</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncliente/lista"><i class="bi bi-people me-1"></i>Clientes</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item active bg-white bg-opacity-25" href="/gestionmascota/lista"><i class="bi bi-github me-1"></i>Mascotas</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionmedico/lista"><i class="bi bi-person-badge me-1"></i>Médicos</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionusuario/lista"><i class="bi bi-person-gear me-1"></i>Usuarios</a></li>
	      </ul>
	      <a href="/inicioSesion/logout" class="btn btn-outline-light btn-sm rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión</a>
	    </div>
	  </div>
	</nav>

<div class="container-fluid px-4 pb-4">
	<!--  -->
	<div class="card page-card">
		
		<div class="card-header bg-dark text-white">
			<h5 class="mb-0 text-white fw-bold"><i class="bi bi-github me-2"></i>Gestión de Usuario</h5>
			<span class="badge bg-white" style="color:#f5576c;">Módulo Usuario</span>
		</div>
		
		<div class="card-body p-4">

			<div class="d-flex justify-content-between mb-3">
				<div>
					<button id="btnNuevo" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#ventanaModal">
						<i class="bi bi-plus-circle"></i> Nuevo Usuario
					</button>
				</div>
			</div>

			<div id="msg" th:if="${msg}" class="alert alert-success alert-dismissible fade show">
				<span th:text="${msg}"></span>
				<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
			</div>
			
			<table id="tablaUsuario" class="table table-bordered table-hover table-striped">
				<thead class="table-dark">
					<tr>
						<th>ID</th>
						<th>Username</th>
						<th>Rol</th>
						<th>Estado</th>			
						<th>Acciones</th>		
					</tr>
				</thead>
				<tbody>
					<tr th:each="u : ${usuarios}">
						<td th:text="${u.idUsuario}"></td>
						<td th:text="${u.username}"></td>
						<td th:text="${u.rol.nombre}"></td>	
						<td>
							<span class="badge bg-succes"
								th:classappend="${u.estado=='ACTIVO'} ? 'bg-success' : 'bg-danger'"
								th:text="${u.estado}">
							</span>
						</td>
						<td>
							<button class="btn btn-warning btn-sm btnEditar" 
									th:data-id="${u.idUsuario}">
								<i class="bi bi-pencil-square"></i>
							</button>
							
							<button class="btn btn-danger btn-sm btnEliminar" 
									th:data-id="${u.idUsuario}">
								<i class="bi bi-trash"></i>
							</button>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
	$('#tablaUsuario').DataTable({
		language : { 
			url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' }
	});
});

	/* Editar */
	$(document).on("click", ".btnEditar", function() {
		let id = $(this).data("id");
		$("#tituloModal").text("Editar Usuario");
		$("#frmUsuario").attr("action","/gestionusuario/registrar"); // Asumiendo que tu método registrar también actualiza (save)

		$.get("/gestionusuario/buscar/" + id, function(data) {
			$("#idUsuario").val(data.idUsuario);
			$("#username").val(data.username);
			$("#password").val(data.password);
			
			// ¡OJO AQUÍ! Como el Rol es un objeto dentro de Usuario, accedemos al ID así:
			$("#rol").val(data.rol.idRol); 
			
			$("#estado").val(data.estado);
			$("#ventanaModal").modal("show");
		});
	});
	
	/* Nuevo */
	$("#btnNuevo").click(function() {
		$("#tituloModal").text("Registrar Usuario");
		$("#frmUsuario").attr("action","/gestionusuario/registrar");
		$("#idUsuario").val(0);
		$("#username").val("");
		$("#password").val("");
		$("#rol").val(""); // Deja el ComboBox en la opción "Seleccione", osea ponerlo en array 0
		$("#estado").val("ACTIVO");
	});
	
	/* Eliminar */
	$(document).on("click", ".btnEliminar", function() {
		let id = $(this).data("id");
		if(confirm("¿Desea cambiar el estado de este Usuario?")) {
			window.location ="/gestionusuario/desactivar/" + id;
		}
	});

</script>

<div class="modal fade" id="ventanaModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<form id="frmUsuario" 
			th:action="@{/gestionusuario/registrar}" 
			th:object="${usuario}" 
			method="post">
				  
				<input type="hidden" id="idUsuario" th:field="*{idUsuario}">
			
				<div class="modal-header bg-dark text-white">
					<h5 class="modal-title" id="tituloModal">
						Registrar Usuario</h5>
					<button type="button" 
							class="btn-close btn-close-white" 
							data-bs-dismiss="modal">
					</button>
				</div>
			
				<div class="modal-body">
					<div class="row">
						
						<div class="col-md-12 mb-3">
							<label>Username</label>
							<input id="username" type="text" class="form-control" th:field="*{username}" required>
						</div>
						
						<div class="col-md-12 mb-3">
							<label>Contraseña</label>
							<input id="password" type="password" class="form-control" th:field="*{password}" required>
						</div>
						
						<div class="col-md-12 mb-3">
							<label>Rol del Sistema</label>
							<select id="rol" class="form-select" th:field="*{rol.idRol}" required>
								<option value="0">Seleccione</option> 
								<option th:each="r : ${roles}" 
										th:value="${r.idRol}" 
										th:text="${r.nombre}">
								</option>
							</select>
						</div>

						<div class="col-md-12 mb-3">
							<label>Estado</label>
							<select id="estado" class="form-select" th:field="*{estado}">
								<option value="ACTIVO">ACTIVO</option>
								<option value="INACTIVO">INACTIVO</option>
							</select>
						</div>
					</div>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						Cerrar</button>
					<button type="submit" class="btn btn-primary">
						Guardar</button>
				</div>
			</form>
		</div>
	</div>
</div>
	
<script>
	/* Auto-cerrar alerta */
		setTimeout(function() {
			let mensaje = document.getElementById("msg");
			if(mensaje){
				let alerta = new bootstrap.Alert(mensaje);
				alerta.close();
			}
		}, 3000);
</script>

</body>
</html>
