<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Médicos - PetCare</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
<style>
  body { background: #f0f2f5; }
  .navbar-petcare { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .page-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .page-card .card-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 16px 16px 0 0; padding: 18px 24px; }
  .btn-nuevo { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border: none; font-weight: 600; border-radius: 10px; padding: 8px 20px; color: #1a5c3a; }
  .btn-nuevo:hover { opacity: 0.9; color: #1a5c3a; }
  .modal-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border-radius: 12px 12px 0 0; }
  .modal-header .btn-close { filter: invert(1); }
  .modal-content { border-radius: 12px; border: none; }
  .form-label { font-weight: 600; font-size: 0.85rem; color: #555; }
  .form-control, .form-select { border-radius: 8px; border-color: #dde1f0; }
  .form-control:focus, .form-select:focus { border-color: #4facfe; box-shadow: 0 0 0 3px rgba(79,172,254,0.15); }
  .nav-link-item { color: rgba(255,255,255,0.85) !important; font-weight: 500; padding: 8px 14px; border-radius: 8px; }
  .nav-link-item:hover { background: rgba(255,255,255,0.15); color: white !important; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-petcare mb-4">
  <div class="container-fluid px-4">
    <span class="navbar-brand text-white fw-bold"><i class="bi bi-heart-pulse-fill me-2"></i>PetCare</span>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncita/lista"><i class="bi bi-calendar2-check me-1"></i>Citas</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncliente/lista"><i class="bi bi-people me-1"></i>Clientes</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionmascota/lista"><i class="bi bi-github me-1"></i>Mascotas</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item active bg-white bg-opacity-25" href="/gestionmedico/lista"><i class="bi bi-person-badge me-1"></i>Médicos</a></li>
        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionusuario/lista"><i class="bi bi-person-gear me-1"></i>Usuarios</a></li>
      </ul>
      <a href="/inicioSesion/logout" class="btn btn-outline-light btn-sm rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-4">
  <div class="card page-card">
    <div class="card-header d-flex align-items-center justify-content-between">
      <h5 class="mb-0 text-white fw-bold"><i class="bi bi-person-badge-fill me-2"></i>Gestión de Médicos Veterinarios</h5>
      <span class="badge bg-white" style="color:#4facfe;">Módulo Médicos</span>
    </div>
    <div class="card-body p-4">

      <div id="msg" th:if="${msg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2 py-2">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
      </div>

      <div class="mb-3">
        <button id="btnNuevo" class="btn btn-nuevo" data-bs-toggle="modal" data-bs-target="#ventanaModal">
          <i class="bi bi-plus-circle me-1"></i> Nuevo Médico
        </button>
      </div>

      <div class="table-responsive">
        <table id="tablaMedico" class="table table-bordered table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>ID</th><th>Nombres</th><th>Apellidos</th>
              <th>Especialidad</th><th>Teléfono</th><th>Estado</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="m : ${medicos}">
              <td th:text="${m.idMedico}"></td>
              <td th:text="${m.nombres}"></td>
              <td th:text="${m.apellidos}"></td>
              <td><span class="badge bg-info text-dark" th:text="${m.especialidad}"></span></td>
              <td th:text="${m.telefono}"></td>
              <td>
                <span class="badge rounded-pill"
                      th:classappend="${m.estado == 'ACTIVO'} ? 'bg-success' : 'bg-danger'"
                      th:text="${m.estado}"></span>
              </td>
              <td>
                <button class="btn btn-warning btn-sm btnEditar" th:data-id="${m.idMedico}" title="Editar">
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-danger btn-sm btnEliminar" th:data-id="${m.idMedico}" title="Desactivar">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>
$(document).ready(function() {
  $('#tablaMedico').DataTable({ language: { url: 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json' } });
});

$("#btnNuevo").click(function() {
  $("#tituloModal").text("Registrar Médico");
  $("#frmMedico").attr("action", "/gestionmedico/registrar");
  $("#idMedico").val(0);
  $("#nombres").val(""); $("#apellidos").val("");
  $("#especialidad").val(""); $("#telefono").val("");
  $("#estado").val("ACTIVO");
});

$(document).on("click", ".btnEditar", function() {
  let id = $(this).data("id");
  $("#tituloModal").text("Editar Médico");
  $("#frmMedico").attr("action", "/gestionmedico/actualizar");
  $.get("/gestionmedico/buscar/" + id, function(data) {
    $("#idMedico").val(data.idMedico);
    $("#nombres").val(data.nombres); $("#apellidos").val(data.apellidos);
    $("#especialidad").val(data.especialidad); $("#telefono").val(data.telefono);
    $("#estado").val(data.estado);
    $("#ventanaModal").modal("show");
  });
});

$(document).on("click", ".btnEliminar", function() {
  let id = $(this).data("id");
  if (confirm("¿Desea desactivar a este médico?")) {
    window.location = "/gestionmedico/desactivar/" + id;
  }
});

setTimeout(function() {
  let m = document.getElementById("msg");
  if (m) { new bootstrap.Alert(m).close(); }
}, 3000);
</script>

<!-- Modal -->
<div class="modal fade" id="ventanaModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="frmMedico" th:action="@{/gestionmedico/registrar}" th:object="${medico}" method="post">
        <input type="hidden" id="idMedico" th:field="*{idMedico}">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal"><i class="bi bi-person-plus-fill me-2"></i>Registrar Médico</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombres</label>
              <input id="nombres" type="text" class="form-control" th:field="*{nombres}" placeholder="Nombres del médico">
            </div>
            <div class="col-md-6">
              <label class="form-label">Apellidos</label>
              <input id="apellidos" type="text" class="form-control" th:field="*{apellidos}" placeholder="Apellidos del médico">
            </div>
            <div class="col-md-6">
              <label class="form-label">Especialidad</label>
              <input id="especialidad" type="text" class="form-control" th:field="*{especialidad}" placeholder="Ej: Cirugía, Medicina General">
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input id="telefono" type="text" class="form-control" th:field="*{telefono}" placeholder="Número de contacto">
            </div>
            <div class="col-md-6">
              <label class="form-label">Estado</label>
              <select id="estado" class="form-select" th:field="*{estado}">
                <option value="ACTIVO">ACTIVO</option>
                <option value="INACTIVO">INACTIVO</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"><i class="bi bi-x me-1"></i>Cerrar</button>
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
