<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Clientes</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- DataTables -->
<link rel="stylesheet"
	href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
	
<!--Estilos-->
<style>
  body { background: #f0f2f5; }
  .navbar-petcare { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .page-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .page-card .card-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border-radius: 16px 16px 0 0; padding: 18px 24px; }
  .btn-nuevo { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border: none; font-weight: 600; border-radius: 10px; padding: 8px 20px; color: #1a5c3a; }
  .btn-nuevo:hover { opacity: 0.9; color: #1a5c3a; }
  .modal-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border-radius: 12px 12px 0 0; }
  .modal-header .btn-close { filter: invert(1); }
  .modal-content { border-radius: 12px; border: none; }
  .form-label { font-weight: 600; font-size: 0.85rem; color: #555; }
  .form-control, .form-select { border-radius: 8px; border-color: #dde1f0; }
  .form-control:focus, .form-select:focus { border-color: #4facfe; box-shadow: 0 0 0 3px rgba(79,172,254,0.15); }
  .nav-link-item { color: rgba(255,255,255,0.85) !important; font-weight: 500; padding: 8px 14px; border-radius: 8px; }
  .nav-link-item:hover { background: rgba(255,255,255,0.15); color: white !important; }
</style>

</head>

<body>

	<nav class="navbar navbar-expand-lg navbar-petcare mb-4">
	  <div class="container-fluid px-4">
	    <span class="navbar-brand text-white fw-bold"><i class="bi bi-heart-pulse-fill me-2"></i>PetCare</span>
	    <div class="collapse navbar-collapse">
	      <ul class="navbar-nav me-auto">
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestioncita/lista"><i class="bi bi-calendar2-check me-1"></i>Citas</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item active bg-white bg-opacity-25" href="/gestioncliente/lista"><i class="bi bi-people me-1"></i>Clientes</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionmascota/lista"><i class="bi bi-github me-1"></i>Mascotas</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionmedico/lista"><i class="bi bi-person-badge me-1"></i>Médicos</a></li>
	        <li class="nav-item"><a class="nav-link nav-link-item" href="/gestionusuario/lista"><i class="bi bi-person-gear me-1"></i>Usuarios</a></li>
	      </ul>
	      <a href="/inicioSesion/logout" class="btn btn-outline-light btn-sm rounded-pill"><i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión</a>
	    </div>
	  </div>
	</nav>
	
<div class="container-fluid px-4 pb-4">

	<div class="card page-card">

		<div class="card-header d-flex align-items-center justify-content-between">
		      <h5 class="mb-0 text-white fw-bold"><i class="bi bi-people-fill me-2"></i>Gestión de Clientes</h5>
		      <span class="badge bg-white" style="color:#4facfe;">Módulo Clientes</span>
		</div>

		<div class="card-body p-4">

			<div class="d-flex justify-content-between mb-3">

				<div class="mb-3">
				        <button id="btnNuevo" class="btn btn-nuevo" data-bs-toggle="modal" data-bs-target="#ventanaModal">
				          <i class="bi bi-plus-circle me-1"></i> Nuevo Cliente
				        </button>
				      </div>

			</div>

			<!-- Mensaje, esto va acompañado de un JavaScript, en la parte final-->
			<!--msg es la variable creada en el controlador, 
				los que llevan redirect.addFlashAttribute-->
			<div id="msg"
					th:if="${msg}"
				class="alert alert-success alert-dismissible fade show ">
						    <span th:text="${msg}"></span>
						    <button type="button"
						            class="btn-close"
						            data-bs-dismiss="alert">
						    </button>
			</div>
			<!--END-->
			<di class="table-responsive">
				<table id="tablaCliente"
					class="table table-bordered table-hover table-striped table-hover align-middle">
	
					<thead class="table-dark">
	
						<tr>
							<th>ID</th>
							<th>Tipo Documento</th>
							<th>Nº Doc</th>
							<th>Nombres</th>
							<th>Apellidos</th>
							<th>Telefono</th>
							<th>Correo</th>
							<th>Dirección</th>
							<th>Estado</th>			
							<th>Acciones</th>		
						</tr>
	
					</thead>
	
					<tbody>
	
						<tr th:each="c:${clientes}">
							<td th:text="${c.idCliente}"></td>
							<td th:text="${c.tipoDocumento}"></td>
							<td th:text="${c.numeroDocumento}"></td>
							<td th:text="${c.nombres}"></td>
							<td th:text="${c.apellidos}"></td>
							<td th:text="${c.telefono}"></td>
							<td th:text="${c.correo}"></td>
							<td th:text="${c.direccion}"></td>	
							<td>
								<!--If Ternario, para cambiar el color al estado-->
								<span class="badge rounded-pill"
									th:classappend="${c.estado=='ACTIVO'} ? 'bg-success' : ' bg-danger'"
									th:text="${c.estado}">
								</span>
							</td>
	
							<td>
								<!--Editar-->
								<!--btn es para el script-->
								<button class="btn btn-warning btn-sm btnEditar"
										th:data-id="${c.idCliente}">
										<i class="bi bi-pencil-square"></i>
									</button>
									<!--Eliminar-->
									<!--btn es para el script-->
									<button class="btn btn-danger btn-sm btnEliminar"
											th:data-id="${c.idCliente}">
										<i class="bi bi-trash"></i>
									</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</div>

</div>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script
	src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

$(document).ready(function() {

	$('#tablaCliente').DataTable({

		language : {
			url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
		}

	});

});

	/* Editar */
	$(document).on("click", ".btnEditar", function() {

		let id = $(this).data("id");
		/*#tituloModal, es el id para el H5, en ventana modal*/
		$("#tituloModal").text("Editar Cliente");
		/*Llamas a el controller y al metodo*/
		$("#frmCliente").attr("action","/gestioncliente/actualizar");
		/*Llamas al controller y al metodo buscar por id*/
		$.get("/gestioncliente/buscar/" + id, 
			function(data) {
			$("#idCliente").val(data.idCliente);
			$("#tipoDocumento").val(data.tipoDocumento);
			$("#numeroDocumento").val(data.numeroDocumento);
			$("#nombres").val(data.nombres);
			$("#apellidos").val(data.apellidos);
			$("#telefono").val(data.telefono);
			$("#correo").val(data.correo);
			$("#direccion").val(data.direccion);
			$("#estado").val(data.estado);
			/*#ventanModal, es el boton de nuevo cliente, arriba*/
		$("#ventanaModal").modal("show");
		});

	});
	/*END*/
	
	/*Para Cambiar el titulo al Modal Registrar y limpiar TextBox*/
	$("#btnNuevo").click(function() {
		$("#tituloModal").text("Registrar Cliente");
		$("#formCliente").attr("action","/gestioncliente/registrar");
		$("#idCliente").val(0);
		$("#tipoDocumento").val("DNI");
		$("#numeroDocumento").val("");
		$("#nombres").val("");
		$("#apellidos").val("");
		$("#telefono").val("");
		$("#correo").val("");
		$("#direccion").val("");
		$("#estado").val("ACTIVO");
	});
	/*END*/
	
	/*Eliminar*/
	$(document).on("click", ".btnEliminar", function() {

		let id = $(this).data("id");

		if(confirm("¿Desea desactivar a este Cliente?")) {
			/*Llamas al controller y al metodo buscar por id*/
			window.location ="/gestioncliente/desactivar/" + id;
		}
	});
	/*END*/


</script>

<!--Venta Modal-->
<div class="modal fade" id="ventanaModal" tabindex="-1">
	
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<!-- Formulario par que funcione el registro -->
			<form id="frmCliente" 
				  th:action="@{/gestioncliente/registrar}"
				  th:object="${cliente}"
				  method="post">
				  
				  <!--*{idCliente} es la entidad e id="idCliente" es a lo que le 
					pasara su referencia o datos-->
				<input type="hidden" id="idCliente" th:field="*{idCliente}">
			
				<div class="modal-header">
					<!--Agregar #tituloModal del script js Editar 
						para cambiarle el nombre a Editar Cliente-->
					<h5 class="modal-title" id="tituloModal"><i class="bi bi-person-plus-fill me-2"></i>
						Registrar Cliente
					</h5>
					<button type="button"
							class="btn-close"
							data-bs-dismiss="modal">
					</button>
				</div>
			
			
				<div class="modal-body p-4">
					<div class="row g-3">
						<!---->
						<div class="col-md-6">
						<label class="form-label">Tipo Documento</label>
						<select id="tipoDocumento" class="form-select" th:field="*{tipoDocumento}">
							<option value="DNI">DNI</option>
							<option value="CE">CE</option>
						</select>
						</div>
						<div class="col-md-6">
							<label class="form-label">Num Documento</label>
							<input id="numeroDocumento" type="text" class="form-control" th:field="*{numeroDocumento}" placeholder="Nº de documento">
						</div>
						<div class="col-md-6">
							<label class="form-label">Nombres</label>
							<input id="nombres" type="text" class="form-control" th:field="*{nombres}" placeholder="Nombres del cliente">
						</div>
						<div class="col-md-6">
							<label class="form-label">Apellidos</label>
							<input id="apellidos" type="text" class="form-control" th:field="*{apellidos}" placeholder="Apellidos del cliente">
						</div>										
						<div class="col-md-6">
							<label class="form-label">Teléfono</label>
							<input id="telefono" type="text" class="form-control" th:field="*{telefono}" placeholder="Número de contacto">
						</div>
						<div class="col-md-6">
							<label class="form-label">Correo</label>
							<input id="correo" type="email" class="form-control" th:field="*{correo}" placeholder="ejemplo@correo.com">
						</div>
						<div class="col-md-6">
							<label class="form-label">Dirección</label>
							<input id="direccion" type="text" class="form-control" th:field="*{direccion}" placeholder="Dirección completa">
						</div>
						<div class="col-md-6">
							<label class="form-label">Estado</label>
							<select id="estado" class="form-select" th:field="*{estado}">
								<option value="ACTIVO">ACTIVO</option>
								<option value="INACTIVO">INACTIVO</option>
							</select>
						</div>
					</div>
				</div>

				<div class="modal-footer bg-light">
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
						Cerrar
					</button>
					<!--Cambiar button por submit-->
					<button type="submit"
							class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>
						Guardar
				</button>
				</div>
		</form>
		</div>
	</div>
</div>

	<script>
	setTimeout(function() {
		/*id de msg, variable controlador, (alerta) */
		let mensaje = document.getElementById("msg");
		if(mensaje){
			let alerta =new bootstrap.Alert(mensaje);
		alerta.close();
		}
	}, 3000);
	</script>

</body>
</html>
