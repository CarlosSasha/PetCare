<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mantenimiento de Buses</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- DataTables -->
<link rel="stylesheet"
	href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

</head>

<body>

<div class="container-fluid mt-4">

	<div class="card shadow">

		<div class="card-header bg-primary text-white">
			<h3 class="mb-0">Mantenimiento de Clientes</h3>
		</div>

		<div class="card-body">

			<div class="alert alert-info">
				<span th:text="Bienvenido"></span>
			</div>

			<div class="d-flex justify-content-between mb-3">

				<div>
					<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#ventanaModal">
					<i class="bi bi-plus-circle"></i>
								Nuevo Cliente
					</button>

				</div>

			</div>


			<table id="tablaCliente"
				class="table table-bordered table-hover table-striped">

				<thead class="table-dark">

					<tr>
											<th>ID</th>
											<th>Tipo Documento</th>
											<th>Nº Doc</th>
											<th>Nombres</th>
											<th>Apellidos</th>
											<th>Telefono</th>
											<th>Correo</th>
											<th>Dirección</th>
											<th>Estado</th>			
											<th>Acciones</th>		
					</tr>

				</thead>

				<tbody>

					<tr th:each="c:${clientes}">

						<td th:text="${c.idCliente}"></td>
						<td th:text="${c.tipoDocumento}"></td>
						<td th:text="${c.numeroDocumento}"></td>
						<td th:text="${c.nombres}"></td>
						<td th:text="${c.apellidos}"></td>
						<td th:text="${c.telefono}"></td>
						<td th:text="${c.correo}"></td>
						<td th:text="${c.direccion}"></td>	

						<td>
							<span class="badge bg-success"
								th:text="${c.estado}">
							</span>
						</td>

						<td>

							<button class="btn btn-warning btn-sm">
									<i class="bi bi-pencil-square"></i>
								</button>

								<button class="btn btn-danger btn-sm">
									<i class="bi bi-trash"></i>
								</button>

						</td>

					</tr>

				</tbody>

			</table>

		</div>

	</div>

</div>

<!-- JQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script
	src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script
	src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<script>

$(document).ready(function() {

	$('#tablaCliente').DataTable({

		language : {
			url : 'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'
		}

	});

});

</script>

<!--Venta Modal-->
<div class="modal fade" id="ventanaModal" tabindex="-1">
	
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<!--
				
			-->
			<div class="modal-header">
				<h5 class="modal-title">
					Registrar Cliente
				</h5>
				<button type="button"
						class="btn-close"
						data-bs-dismiss="modal">
				</button>
			</div>
			
			
			<div class="modal-body">
				<div class="row">
					<div class="col-md-6 mb-3">
						<!--BomboBox innecesario-->
						<label>Marca Bus</label>
						<select class="form-select">
							<option value="">
								Seleccione Cliente
							</option>
							<option
								th:each="xxxxxxxxxxx"
								th:value="xxxxxxxxxxx"
								th:text="xxxxxxxxxxxx">
							</option>
						</select>
					</div>
					<div class="col-md-6 mb-3">
						<label>Modelo</label>
						<input type="text" class="form-control">
					</div>
					<div class="col-md-6 mb-3">
						<label>Placa</label>
						<input type="text" class="form-control">
					</div>
					<div class="col-md-6 mb-3">

						<label>Capacidad</label>

						<input type="number" class="form-control">
					</div>
					<div class="col-md-6 mb-3">
						<label>Estado</label>
						<select class="form-select">
							<option>ACTIVO</option>
							<option>INACTIVO</option>
						</select>
					</div>
				</div>
			</div>

			<div class="modal-footer">
			<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
					Cerrar
				</button>
				<button type="button"
						class="btn btn-primary">
					Guardar
				</button>
			</div>
		</div>
	</div>
</div>


</body>
</html>
